name: Semiannual SINAPI Sync Dry Run

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 1 1,7 *"

permissions:
  contents: read

jobs:
  dry-run:
    name: Validate SINAPI sync fixture
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run dry-run validation
        run: node scripts/sinapi-sync-monthly.mjs --dry-run --json
